version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: csfd_postgres
    environment:
      POSTGRES_USER: csfd_user
      POSTGRES_PASSWORD: csfd_password
      POSTGRES_DB: csfd_vod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csfd_user -d csfd_vod"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
